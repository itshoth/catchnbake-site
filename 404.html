<!DOCTYPE html>
<!-- 404 page — Cloudflare Pages serves this automatically for unknown routes. -->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Page not found — Catch 'N Bake</title>
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#f8f2e7" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<style>
  @font-face{font-family:'Fraunces';font-style:normal;font-weight:400 700;font-display:swap;src:url('/fonts/fraunces-latin.woff2') format('woff2')}
  @font-face{font-family:'Inter';font-style:normal;font-weight:400 600;font-display:swap;src:url('/fonts/inter-latin.woff2') format('woff2')}
  :root{--paper:#f8f2e7;--ink:#1e1b16;--ink-soft:#4d463a;--rule:#ddd3c2;--brand:#8a5303;      /* dark amber — app accent family, 5.7:1 on paper */
    --brand-mid:#b45309;  /* amber-700 — large text on paper, white-text fills */
    --brand-bright:#f59e0b; /* app primary amber — dark-bg text, buttons, decoration */
    --ember:#b45309}
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:2rem;line-height:1.7;
  }
  .eyebrow{font-size:.78rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ember);margin-bottom:1rem}
  h1{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:clamp(2.2rem,6vw,3.6rem);line-height:1.1;margin-bottom:1rem}
  p{color:var(--ink-soft);max-width:34em;margin-bottom:2rem}
  a.btn{
    display:inline-block;background:var(--brand-bright);color:var(--ink);text-decoration:none;
    padding:.75rem 1.75rem;border-radius:8px;font-weight:600;
  }
  a.btn:hover{background:#d97706}
  :focus-visible{outline:2px solid var(--brand);outline-offset:3px}
</style>
<script type="text/javascript">
    /* Microsoft Clarity — deferred until after the load event so it never competes with page rendering */
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        function go(){t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);}
        function later(){setTimeout(go,3000)}
        if(l.readyState==="complete"){later()}else{c.addEventListener("load",later)}
    })(window, document, "clarity", "script", "xhwobxiz8q");
</script>
</head>
<body>
  <p class="eyebrow">404</p>
  <h1>The one that got away.</h1>
  <p>This page isn't here — maybe it was released, maybe it never existed. The fishing's better back at the dock.</p>
  <a class="btn" href="/">Back to Catch 'N Bake</a>
</body>
</html>
